name: Deploy Docker to Personal Server

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest       # Build trên GitHub (miễn phí)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-portfolio:latest

  deploy:
    runs-on: self-hosted          # Deploy trên laptop server của bạn
    needs: build                  # Chờ build xong mới deploy
    steps:
      - name: Pull & Deploy
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-portfolio:latest
          docker stop my-portfolio || true
          docker rm my-portfolio || true
          docker run -d \
            --name my-portfolio \
            -p 6060:80 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/my-portfolio:latest

      - name: Verify
        run: |
          sleep 3
          curl -f http://localhost:6060 && echo "✅ Deploy thành công!"
